services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-karta_secret}@db:5432/karta_sdr
      - GEMINI_API_KEY=demo-mode
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../credentials.json:/app/credentials.json:ro
    networks:
      - karta-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_VAPI_PUBLIC_KEY: ${VITE_VAPI_PUBLIC_KEY:-df9e53f1-733b-4610-a2fc-eb2aabefa267}
        VITE_VAPI_ASSISTANT_ID: ${VITE_VAPI_ASSISTANT_ID:-26e84999-7057-44a3-a04a-2b8c2ac269ff}
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - karta-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: karta_sdr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-karta_secret}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d karta_sdr"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - karta-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - karta-network
    profiles:
      - with-redis

volumes:
  pgdata:

networks:
  karta-network:
    driver: bridge
